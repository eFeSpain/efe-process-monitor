<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="#30363d" stroke-width="1.5"/>

  <!-- Hexagon shell (the ⬡ motif) -->
  <polygon points="32,8 52.8,20 52.8,44 32,56 11.2,44 11.2,20"
           fill="none" stroke="url(#hex)" stroke-width="2.5" stroke-linejoin="round" opacity="0.9"/>

  <!-- Connection links from the central process to peripheral nodes -->
  <g stroke-width="2" stroke-linecap="round" filter="url(#glow)">
    <line x1="32" y1="32" x2="32" y2="17"  stroke="#3fb950"/>
    <line x1="32" y1="32" x2="19" y2="42"  stroke="#58a6ff"/>
    <line x1="32" y1="32" x2="45" y2="42"  stroke="#f85149"/>
  </g>

  <!-- Peripheral nodes (remote endpoints, colored by risk) -->
  <circle cx="32" cy="17" r="3.2" fill="#3fb950"/>
  <circle cx="19" cy="42" r="3.2" fill="#58a6ff"/>
  <circle cx="45" cy="42" r="3.6" fill="#f85149"/>

  <!-- Central process node -->
  <circle cx="32" cy="32" r="5.2" fill="url(#hex)" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="2"   fill="#0d1117"/>
</svg>
