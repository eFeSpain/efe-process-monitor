name: Release

# Trigger by pushing a version tag, e.g.:  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to create the release and upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build all platforms
        run: |
          mkdir -p dist
          for t in windows/amd64 windows/arm64 linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os=${t%/*}; arch=${t#*/}
            out="efemon-${os}-${arch}"
            ld="-s -w"
            if [ "$os" = "windows" ]; then
              out="${out}.exe"
              ld="$ld -H=windowsgui"   # no console window; runs in the tray
            fi
            echo "→ building $out"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -trimpath -ldflags="$ld" -o "dist/$out" .
          done
          ( cd dist && sha256sum * > checksums.txt )
          ls -la dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}   # v*-beta / -rc → marked as pre-release
